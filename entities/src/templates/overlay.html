<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <style>
    @page { size: A4; margin: 0; }

    html, body {
      width: 210mm;
      height: 297mm;
      margin: 0;
      padding: 0;
      background: transparent;
    }

    .page {
      position: relative;
      width: 210mm;
      height: 297mm;
      background: transparent;
    }

    .mono { font-family: ui-monospace, Menlo, Consolas, "Courier New", monospace; }

    /* Márgenes del PDF base */
    :root {
      --mt: 12mm;
      --mr: 12mm;
      --mb: 18mm;
      --ml: 18mm;
    }

    /* Lateral */
    .left-txt {
      position: absolute;
      left: 14mm;
      bottom: calc(var(--mb) + 5mm);
      transform: rotate(-90deg);
      transform-origin: left bottom;

      width: 275mm;
      font-size: 7px;
      color: #444;

      white-space: normal;
      line-height: 1;
    }

    .left-line {
      display: block;
      width: 275mm;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      padding: 0;
      margin: 0;
    }

    /* QR */
    .qr {
      position: absolute;
      left: var(--ml);
      bottom: 6mm;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5mm;
    }
    .qr img {
      width: 18mm;
      height: 18mm;
    }
    .qr .txt {
      font-size: 8px;
      color: #444;
      line-height: 1.2;
      white-space: nowrap;
      text-align: center;
      width: 24mm;
    }

    /* Identificador */
    .footer-meta {
      position: absolute;
      right: var(--mr);
      bottom: 6mm;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 9px;
      color: #444;
      font-weight: 400;
      text-align: right;
      line-height: 1.3;
    }
    .footer-meta .row-label { font-weight: 700; display: block; }
    .footer-meta .val { font-weight: 400; display: inline; }
    .footer-meta div { margin: 0.5mm 0; padding: 0; }
  </style>
</head>
<body>
  <div class="page">
    <!-- Lateral -->
    <div class="left-txt mono">
      <span class="left-line">Emisor: {{ issuer_did }}</span>
      <span class="left-line">Método: {{ kid }}</span>
      <span class="left-line">Alg: {{ alg }}</span>
      <span class="left-line">Fecha de creación: {{ date }}</span>
    </div>

    <!-- Footer: QR -->
    <div class="qr">
      <img src="{{ qr_data_uri }}" alt="QR" />
      <div class="txt mono">
        {% if qr_content is defined %}{{ qr_content }}{% endif %}
      </div>
    </div>

    <!-- Footer: Identificador + codificación -->
    <div class="footer-meta">
      <div><span class="row-label">identificador:</span> <span class="val mono">{{ pdf_id }}</span></div>
      <div><span class="row-label">codificación:</span> <span class="val mono">{{ codificacion }}</span></div>
    </div>
  </div>
</body>
</html>
